name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck + fish
        run: sudo apt-get update && sudo apt-get install -y shellcheck fish

      - name: Shellcheck install.sh
        run: shellcheck -s sh install.sh

      - name: Fish syntax check hooks
        run: |
          for f in plugin/hooks/*.fish; do
            fish -n "$f" || exit 1
          done

      - name: Fish syntax check scripts
        run: |
          for f in plugin/scripts/*.fish; do
            fish -n "$f" || exit 1
          done

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded personal paths
        run: |
          if grep -rn '/home/' . --include='*.md' --include='*.fish' --include='*.sh' --include='*.json' --include='*.yml' 2>/dev/null | grep -v '.git/' | grep -v 'tmp/test-home'; then
            echo "FAIL: hardcoded /home/ paths found"
            exit 1
          fi
          echo "No hardcoded personal paths"

      - name: Validate package.json
        run: python3 -c "import json; json.load(open('plugin/package.json'))"

      - name: Validate SKILL.md frontmatter
        run: |
          for skill_dir in plugin/skills/*/; do
            SKILL_FILE="${skill_dir}SKILL.md"
            if [ ! -f "$SKILL_FILE" ]; then
              echo "Missing SKILL.md in $skill_dir"
              exit 1
            fi
            if ! grep -q "^name:" "$SKILL_FILE"; then
              echo "Missing 'name' in $SKILL_FILE"
              exit 1
            fi
            if ! grep -q "^description:" "$SKILL_FILE"; then
              echo "Missing 'description' in $SKILL_FILE"
              exit 1
            fi
          done

      - name: Validate versions.json
        run: python3 -c "import json; json.load(open('versions.json'))"

  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test dev install
        run: |
          mkdir -p /tmp/test-home/.local/bin
          ./install.sh --dev --prefix /tmp/test-home/.local/bin

      - name: Verify binaries exist
        run: |
          for tool in magellan llmgrep mirage splice; do
            test -x "/tmp/test-home/.local/bin/$tool" || { echo "$tool not found"; exit 1; }
          done

      - name: Verify plugin completeness
        run: |
          skills=$(find plugin/skills/ -name "SKILL.md" | wc -l)
          hooks=$(find plugin/hooks/ -name "*.fish" | wc -l)
          scripts=$(find plugin/scripts/ -type f | wc -l)
          echo "Skills: $skills, Hooks: $hooks, Scripts: $scripts"
          test "$skills" -ge 12
          test "$hooks" -ge 3
          test "$scripts" -ge 15

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and run Gitleaks
        run: |
          curl -sL https://github.com/zricethezav/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --verbose --config .gitleaks.toml

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep OSS scan
        run: semgrep ci --oss-only --config .semgrep/rules/
